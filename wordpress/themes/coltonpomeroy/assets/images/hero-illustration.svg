<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 480" fill="none">
  <!-- Background decorative blob -->
  <ellipse cx="260" cy="240" rx="220" ry="210" fill="#C4763B" opacity="0.06"/>
  <ellipse cx="280" cy="250" rx="180" ry="175" fill="#C4763B" opacity="0.04"/>

  <!-- Monitor/laptop -->
  <rect x="80" y="60" width="360" height="240" rx="16" fill="#2C2C2C"/>
  <rect x="80" y="60" width="360" height="240" rx="16" stroke="#3D3D3D" stroke-width="2"/>

  <!-- Screen -->
  <rect x="96" y="76" width="328" height="200" rx="8" fill="#1E1E1E"/>

  <!-- Code editor titlebar -->
  <rect x="96" y="76" width="328" height="28" rx="8" fill="#2C2C2C"/>
  <rect x="96" y="96" width="328" height="8" fill="#2C2C2C"/>
  <!-- Titlebar dots -->
  <circle cx="114" cy="90" r="5" fill="#E74C3C" opacity="0.8"/>
  <circle cx="130" cy="90" r="5" fill="#F1C40F" opacity="0.8"/>
  <circle cx="146" cy="90" r="5" fill="#7A9E7E" opacity="0.8"/>

  <!-- Sidebar -->
  <rect x="96" y="104" width="60" height="172" fill="#252525"/>

  <!-- Sidebar file icons -->
  <rect x="108" y="116" width="36" height="6" rx="2" fill="#555" opacity="0.6"/>
  <rect x="108" y="130" width="28" height="6" rx="2" fill="#C4763B" opacity="0.7"/>
  <rect x="108" y="144" width="32" height="6" rx="2" fill="#555" opacity="0.4"/>
  <rect x="108" y="158" width="24" height="6" rx="2" fill="#555" opacity="0.4"/>
  <rect x="108" y="172" width="30" height="6" rx="2" fill="#555" opacity="0.4"/>
  <rect x="108" y="186" width="36" height="6" rx="2" fill="#555" opacity="0.4"/>

  <!-- Code lines -->
  <!-- Line 1: keyword + function name -->
  <rect x="172" y="116" width="36" height="6" rx="2" fill="#C4763B" opacity="0.9"/>
  <rect x="214" y="116" width="52" height="6" rx="2" fill="#7A9E7E" opacity="0.8"/>
  <rect x="272" y="116" width="12" height="6" rx="2" fill="#F1C40F" opacity="0.5"/>

  <!-- Line 2: indented -->
  <rect x="184" y="132" width="24" height="6" rx="2" fill="#569CD6" opacity="0.7"/>
  <rect x="214" y="132" width="68" height="6" rx="2" fill="#D4D4D4" opacity="0.5"/>
  <rect x="288" y="132" width="40" height="6" rx="2" fill="#CE9178" opacity="0.6"/>

  <!-- Line 3: indented -->
  <rect x="184" y="148" width="28" height="6" rx="2" fill="#569CD6" opacity="0.7"/>
  <rect x="218" y="148" width="44" height="6" rx="2" fill="#D4D4D4" opacity="0.5"/>

  <!-- Line 4: deeper indent -->
  <rect x="196" y="164" width="32" height="6" rx="2" fill="#C4763B" opacity="0.8"/>
  <rect x="234" y="164" width="80" height="6" rx="2" fill="#D4D4D4" opacity="0.4"/>
  <rect x="320" y="164" width="48" height="6" rx="2" fill="#7A9E7E" opacity="0.6"/>

  <!-- Line 5 -->
  <rect x="196" y="180" width="20" height="6" rx="2" fill="#569CD6" opacity="0.7"/>
  <rect x="222" y="180" width="56" height="6" rx="2" fill="#CE9178" opacity="0.5"/>

  <!-- Line 6: comment -->
  <rect x="184" y="196" width="100" height="6" rx="2" fill="#6A9955" opacity="0.5"/>

  <!-- Line 7 -->
  <rect x="184" y="212" width="36" height="6" rx="2" fill="#C4763B" opacity="0.8"/>
  <rect x="226" y="212" width="60" height="6" rx="2" fill="#D4D4D4" opacity="0.5"/>

  <!-- Line 8: return -->
  <rect x="184" y="228" width="44" height="6" rx="2" fill="#569CD6" opacity="0.7"/>
  <rect x="234" y="228" width="72" height="6" rx="2" fill="#7A9E7E" opacity="0.6"/>

  <!-- Line 9: closing -->
  <rect x="172" y="244" width="12" height="6" rx="2" fill="#F1C40F" opacity="0.5"/>

  <!-- Cursor blink line -->
  <rect x="172" y="258" width="2" height="10" rx="1" fill="#C4763B" opacity="0.8"/>

  <!-- Laptop base -->
  <path d="M60 300 L80 300 L80 308 Q80 316 88 316 L432 316 Q440 316 440 308 L440 300 L460 300 Q468 300 466 310 L454 338 Q452 344 444 344 L76 344 Q68 344 66 338 L54 310 Q52 300 60 300Z" fill="#2C2C2C"/>
  <path d="M60 300 L80 300 L80 308 Q80 316 88 316 L432 316 Q440 316 440 308 L440 300 L460 300 Q468 300 466 310 L454 338 Q452 344 444 344 L76 344 Q68 344 66 338 L54 310 Q52 300 60 300Z" stroke="#3D3D3D" stroke-width="1"/>

  <!-- Trackpad -->
  <rect x="210" y="306" width="100" height="28" rx="6" fill="#353535" opacity="0.6"/>

  <!-- Floating elements — decorative tech badges -->

  <!-- React-ish atom -->
  <g transform="translate(30, 120)" opacity="0.7">
    <ellipse cx="24" cy="24" rx="22" ry="8" stroke="#C4763B" stroke-width="1.5" fill="none" transform="rotate(0 24 24)"/>
    <ellipse cx="24" cy="24" rx="22" ry="8" stroke="#C4763B" stroke-width="1.5" fill="none" transform="rotate(60 24 24)"/>
    <ellipse cx="24" cy="24" rx="22" ry="8" stroke="#C4763B" stroke-width="1.5" fill="none" transform="rotate(120 24 24)"/>
    <circle cx="24" cy="24" r="3" fill="#C4763B"/>
  </g>

  <!-- WordPress-ish "W" badge -->
  <g transform="translate(440, 150)" opacity="0.6">
    <circle cx="20" cy="20" r="18" fill="none" stroke="#1B2A4A" stroke-width="1.5"/>
    <text x="20" y="26" text-anchor="middle" font-family="serif" font-size="18" font-weight="700" fill="#1B2A4A">W</text>
  </g>

  <!-- Terminal/command prompt -->
  <g transform="translate(420, 80)" opacity="0.5">
    <rect width="60" height="40" rx="6" fill="#2C2C2C" stroke="#3D3D3D" stroke-width="1"/>
    <text x="8" y="18" font-family="monospace" font-size="10" fill="#7A9E7E">$_</text>
    <rect x="8" y="24" width="32" height="4" rx="1" fill="#C4763B" opacity="0.6"/>
  </g>

  <!-- Brackets icon -->
  <g transform="translate(20, 260)" opacity="0.5">
    <text x="0" y="24" font-family="monospace" font-size="28" font-weight="700" fill="#C4763B">&lt;/&gt;</text>
  </g>

  <!-- Floating dots pattern -->
  <circle cx="470" cy="300" r="3" fill="#C4763B" opacity="0.3"/>
  <circle cx="488" cy="288" r="2" fill="#C4763B" opacity="0.2"/>
  <circle cx="480" cy="310" r="2.5" fill="#C4763B" opacity="0.25"/>
  <circle cx="40" cy="360" r="3" fill="#1B2A4A" opacity="0.2"/>
  <circle cx="58" cy="370" r="2" fill="#1B2A4A" opacity="0.15"/>
  <circle cx="50" cy="380" r="2.5" fill="#C4763B" opacity="0.2"/>

  <!-- Coffee cup (personal touch) -->
  <g transform="translate(440, 360)" opacity="0.5">
    <path d="M0 10 Q0 0 10 0 L30 0 Q40 0 40 10 L38 32 Q38 40 30 40 L10 40 Q2 40 2 32 Z" fill="#2C2C2C" stroke="#3D3D3D" stroke-width="1"/>
    <path d="M40 8 Q52 8 52 18 Q52 28 40 28" stroke="#3D3D3D" stroke-width="1.5" fill="none"/>
    <!-- Steam -->
    <path d="M12 -4 Q14 -10 12 -16" stroke="#C4763B" stroke-width="1" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M20 -2 Q22 -10 20 -18" stroke="#C4763B" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round"/>
    <path d="M28 -4 Q30 -10 28 -16" stroke="#C4763B" stroke-width="1" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Gear/settings icon -->
  <g transform="translate(460, 240)" opacity="0.4">
    <circle cx="12" cy="12" r="4" fill="none" stroke="#1B2A4A" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="10" fill="none" stroke="#1B2A4A" stroke-width="1.5" stroke-dasharray="4 4"/>
  </g>
</svg>