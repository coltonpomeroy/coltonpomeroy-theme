name: Deploy to DreamHost

on:
  push:
    branches:
      - main
    paths:
      - 'wordpress/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy WordPress theme via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.DREAMHOST_SERVER }}
          username: ${{ secrets.DREAMHOST_USERNAME }}
          password: ${{ secrets.DREAMHOST_PASSWORD }}
          port: 22
          local_path: ./wordpress/themes/coltonpomeroy/*
          remote_path: ${{ secrets.DREAMHOST_THEME_PATH }}
          sftp_only: true
